<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thu tiền nợ khách hàng - SmartFit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-header { background-color: #f1f1f1; color: #2c0c66; }
        tr.selected { background-color: #e7f1ff !important; border-left: 5px solid #0d0d0e; }
        .overdue-row { background-color: #fff1f0; }
        .cursor-pointer { cursor: pointer; }
        
        /* Cấu hình vùng in */
        #printArea { display: none; }
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea {
                display: block !important;
                position: absolute;
                left: 0; top: 0; width: 100%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="printArea"></div>

    <div class="container py-4">
        <a href="index.html" class="text-decoration-none">← Trang chủ</a>
        <h3 class="mt-2 mb-4 fw-bold text-uppercase">Thu tiền nợ khách hàng</h3>

        <div class="card mb-3 shadow-sm">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-9">
                        <label for="searchInput" class="form-label fw-semibold">Tìm khách hàng</label>
                        <input id="searchInput" type="text" class="form-control" placeholder="Nhập Mã KH / Tên / SĐT / Địa chỉ..." />
                    </div>
                    <div class="col-md-3 d-grid">
                        <label class="form-label">&nbsp;</label>
                        <button class="btn btn-primary" onclick="renderCustomerList()">Tìm kiếm</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="alertBox" class="mb-3"></div>

        <div class="card mb-3 shadow-sm">
            <div class="card-header fw-semibold">Danh sách khách hàng đang nợ</div>
            <div class="card-body p-0">
                <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                    <table class="table table-bordered table-hover mb-0">
                        <thead class="table-light sticky-top">
                            <tr>
                                <th>Mã KH</th>
                                <th>Khách hàng</th>
                                <th>Liên hệ</th>
                                <th>Nợ hiện tại</th>
                                <th class="text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="customerTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="card mb-3 shadow-sm border-success">
            <div class="card-header bg-success text-white fw-semibold">Lập phiếu thu tiền</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Số tiền thu (VND)</label>
                        <input id="amountInput" type="text" class="form-control fw-bold text-primary" placeholder="Ví dụ: 2.000.000" />
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Phương thức thanh toán</label>
                        <select id="paymentMethod" class="form-select">
                            <option value="Tiền mặt">Tiền mặt</option>
                            <option value="Chuyển khoản">Chuyển khoản</option>
                            <option value="Ví điện tử">Ví điện tử</option>
                        </select>
                    </div>
                    <div class="col-md-4 d-flex align-items-end gap-2">
                        <button id="confirmBtn" class="btn btn-success w-100">Xác nhận thu nợ</button>
                        <button id="printBtn" class="btn btn-outline-secondary" disabled onclick="printReceipt()">In phiếu</button>
                    </div>
                </div>
                <hr />
                <div id="receiptSection" class="text-muted small fst-italic">Chưa có giao dịch nào được thực hiện.</div>
            </div>
        </div>

        <div class="card shadow-sm border-dark">
            <div class="card-header fw-semibold bg-dark text-white">Chi tiết các hóa đơn chưa thanh toán</div>
            <div class="card-body" id="detailSection">
                <p class="mb-0 text-muted">Chọn một khách hàng ở bảng trên để xem chi tiết hóa đơn.</p>
            </div>
        </div>
    </div>

    <script>

        let selectedCustomer = null;

        // Dữ liệu mẫu (Invoices nợ)
        const customers = [

        { id: "KH011", name: "Trần Thị Quỳnh Lê", phone: "0912378938", email: "le.quynh@gmail.com", address: "44 Lê Văn Sỹ, Tân Bình", invoices: [{ code: "HD1209", amount: 23523000, dueDate: "2026-01-10" }] },
        { id: "KH012", name: "Nguyễn Thị Vân", phone: "0937325117", email: "van.nt@outlook.com", address: "102 Hoàng Văn Thụ, Phú Nhuận", invoices: [{ code: "HD1309", amount: 3320000, dueDate: "2025-11-20" }] },

        { id: "KH014", name: "Ngô Kim Vân", phone: "0235232353", email: "van.kn@gmail.com", address: "82 Đinh Tiên Hoàng, Bình Thạnh", invoices: [{ code: "HD2353", amount: 2352000, dueDate: "2026-04-22" }] },
        { id: "KH015", name: "Đặng Kim Trúc", phone: "0945342533", email: "truc.dang@yahoo.com", address: "19 Nguyễn Kiệm, Gò Vấp", invoices: [{ code: "HD4363", amount: 3466000, dueDate: "2026-03-01" }] },
        { id: "KH016", name: "Phạm Thu Quỳnh", phone: "0235236235", email: "quynh.p@gmail.com", address: "25 Cộng Hòa, Tân Bình", invoices: [{ code: "HD1601", amount: 2223520, dueDate: "2026-05-25" }] },
        { id: "KH017", name: "Vũ Minh Hoàng", phone: "0903112233", email: "hoang.vu@gmail.com", address: "50 Trường Chinh, Tân Bình", invoices: [{ code: "HD1701", amount: 4500000, dueDate: "2026-04-10" }] },
        { id: "KH018", name: "Đỗ Thị Mai", phone: "0933445566", email: "mai.do@gmail.com", address: "120 Điện Biên Phủ, Q.1", invoices: [{ code: "HD1801", amount: 1200000, dueDate: "2026-05-15" }] },
        { id: "KH019", name: "Hoàng Văn Nam", phone: "0911223344", email: "nam.h@yahoo.com", address: "35 Nam Kỳ Khởi Nghĩa, Q.1", invoices: [{ code: "HD1901", amount: 890000, dueDate: "2026-03-20" }] },
        { id: "KH020", name: "Lý Thu Thủy", phone: "0944556677", email: "thuy.ly@gmail.com", address: "288 Nguyễn Văn Cừ, Q.5", invoices: [{ code: "HD2001", amount: 5600000, dueDate: "2026-04-15" }] },
        { id: "KH021", name: "Chu Kim Liên", phone: "0966778899", email: "lien.chu@outlook.com", address: "15 Hậu Giang, Q.6", invoices: [{ code: "HD2101", amount: 3200000, dueDate: "2026-02-28" }] },
        { id: "KH022", name: "Đinh Công Thành", phone: "0977889900", email: "thanh.d@gmail.com", address: "99 Kinh Dương Vương, Q.6", invoices: [{ code: "HD2201", amount: 1500000, dueDate: "2026-06-01" }] },
        { id: "KH023", name: "Võ Thị Sáu", phone: "0988990011", email: "sau.vo@gmail.com", address: "06 Võ Thị Sáu, Q.1", invoices: [{ code: "HD2301", amount: 780000, dueDate: "2026-03-05" }] },
        { id: "KH024", name: "Trương Mỹ Linh", phone: "0909090909", email: "linh.t@gmail.com", address: "412 CMT8, Q.10", invoices: [{ code: "HD2401", amount: 12500000, dueDate: "2026-04-20" }] },
        { id: "KH025", name: "Phan Anh Tuấn", phone: "0919191919", email: "tuan.p@yahoo.com", address: "55 Nguyễn Oanh, Gò Vấp", invoices: [{ code: "HD2501", amount: 4300000, dueDate: "2026-01-20" }] },
        { id: "KH026", name: "Hà Thị Ngọc", phone: "0929292929", email: "ngoc.ha@gmail.com", address: "18 Thống Nhất, Gò Vấp", invoices: [{ code: "HD2601", amount: 950000, dueDate: "2026-05-10" }] },
        { id: "KH027", name: "Tô Vĩnh Diện", phone: "0939393939", email: "dien.to@gmail.com", address: "22 Nơ Trang Long, Bình Thạnh", invoices: [{ code: "HD2701", amount: 2100000, dueDate: "2026-03-30" }] },
        { id: "KH028", name: "Bùi Thị Xuân", phone: "0949494949", email: "xuan.b@outlook.com", address: "134 Nguyễn Xí, Bình Thạnh", invoices: [{ code: "HD2801", amount: 6700000, dueDate: "2026-04-18" }] },
        { id: "KH029", name: "Dương Quá", phone: "0959595959", email: "qua.d@gmail.com", address: "01 Phạm Văn Đồng, Thủ Đức", invoices: [{ code: "HD2901", amount: 12000000, dueDate: "2026-02-10" }] },
        { id: "KH030", name: "Nguyễn Tiểu Long", phone: "0969696969", email: "long.nt@gmail.com", address: "10 Kha Vạn Cân, Thủ Đức", invoices: [{ code: "HD3001", amount: 3400000, dueDate: "2026-05-05" }] }
      ];
        function formatMoney(v) { return v.toLocaleString("vi-VN") + " VND"; }

        // Format tiền khi gõ
        document.getElementById("amountInput").addEventListener("input", function(e) {
            let val = e.target.value.replace(/\D/g, "");
            e.target.value = val ? Number(val).toLocaleString("vi-VN") : "";
        });

        // Hiển thị danh sách khách hàng
        function renderCustomerList() {
            const keyword = document.getElementById("searchInput").value.toLowerCase();
            const filtered = customers.filter(c => 
                c.id.toLowerCase().includes(keyword) || 
                c.name.toLowerCase().includes(keyword) || 
                c.phone.includes(keyword)
            );
            
            document.getElementById("customerTableBody").innerHTML = filtered.map(c => {
                const totalDebt = c.invoices.filter(i => !i.paid).reduce((s, i) => s + i.amount, 0);
                const hasOverdue = c.invoices.some(i => !i.paid && new Date(i.dueDate) < today);
                
                return `
                    <tr class="cursor-pointer ${selectedCustomer?.id === c.id ? 'selected' : ''} ${hasOverdue ? 'overdue-row' : ''}" 
                        onclick="selectCustomer('${c.id}')">
                        <td>${c.id}</td>
                        <td><div class="fw-bold">${c.name}</div></td>
                        <td><div class="text-primary">${c.phone}</div></td>
                        <td class="text-danger fw-bold">${formatMoney(totalDebt)}</td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation(); viewDetail('${c.id}')">Xem HĐ</button>
                        </td>
                    </tr>`;
            }).join('');
        }

        window.selectCustomer = function(id) {
            selectedCustomer = customers.find(c => c.id === id);
            renderCustomerList();
            document.getElementById("alertBox").innerHTML = `<div class="alert alert-info py-2 shadow-sm">Đang lập phiếu cho: <b>${selectedCustomer.name}</b></div>`;
            viewDetail(id);
        };

        window.viewDetail = function(id) {
            const c = customers.find(item => item.id === id);
            const unpaid = c.invoices.filter(i => !i.paid);
            
            if (unpaid.length === 0) {
                document.getElementById("detailSection").innerHTML = `<p class="text-success fw-bold text-center py-3">Đã thanh toán hết nợ.</p>`;
                return;
            }

            document.getElementById("detailSection").innerHTML = `
                <table class="table table-sm table-bordered">
                    <thead class="table-light">
                        <tr><th>Mã HĐ</th><th>Tiền nợ</th><th>Hạn nợ</th></tr>
                    </thead>
                    <tbody>
                        ${unpaid.map(inv => `
                            <tr>
                                <td>${inv.code}</td>
                                <td class="fw-bold">${formatMoney(inv.amount)}</td>
                                <td>${inv.dueDate}</td>
                            </tr>`).join('')}
                    </tbody>
                </table>`;
        };

        // --- XỬ LÝ XÁC NHẬN THU NỢ & KIỂM TRA THU THỪA ---
        document.getElementById("confirmBtn").onclick = () => {
            const valRaw = document.getElementById("amountInput").value.replace(/\./g, "");
            const amount = Number(valRaw);

            if (!selectedCustomer) return alert("Vui lòng chọn khách hàng!");
            if (amount <= 0) return alert("Số tiền không hợp lệ!");

            // 1. Tính tổng nợ hiện tại
            const totalDebt = selectedCustomer.invoices
                .filter(i => !i.paid)
                .reduce((s, i) => s + i.amount, 0);

            // 2. Kiểm tra thu thừa
            if (amount > totalDebt) {
                const diff = amount - totalDebt;
                const isConfirmed = confirm(
                    `CẢNH BÁO THU THỪA!\n\n` +
                    `Tổng nợ: ${formatMoney(totalDebt)}\n` +
                    `Số tiền nhập: ${formatMoney(amount)}\n` +
                    `Thừa: ${formatMoney(diff)}\n\n` +
                    `Bạn có chắc chắn muốn tiếp tục không?`
                );
                if (!isConfirmed) return; // Dừng lại nếu nhân viên bấm Cancel
            }

            // 3. Tiến hành trừ nợ (Logic gạch nợ cuốn chiếu)
            currentReceiptData = {
                name: selectedCustomer.name,
                id: selectedCustomer.id,
                phone: selectedCustomer.phone,
                amount: amount,
                method: document.getElementById("paymentMethod").value,
                date: new Date().toLocaleString('vi-VN'),
                address: selectedCustomer.address,
                email: selectedCustomer.email
            };

            let remaining = amount;
            selectedCustomer.invoices.filter(i => !i.paid).forEach(inv => {
                if (remaining > 0) {
                    if (remaining >= inv.amount) {
                        remaining -= inv.amount;
                        inv.paid = true;
                    } else {
                        inv.amount -= remaining;
                        remaining = 0;
                    }
                }
            });

            // 4. Cập nhật giao diện
            document.getElementById("receiptSection").innerHTML = `
                <div class="alert alert-success border-0 p-2 mb-0">
                    ✅ Thu tiền thành công: <b>${formatMoney(amount)}</b>.<br>
                    ${remaining > 0 ? `<span class="text-danger">⚠️ Lưu ý: Thừa ${formatMoney(remaining)} (Đã vào thẻ thành viên).</span>` : 'Đã khấu trừ vào các hóa đơn nợ.'}
                </div>`;
            
            document.getElementById("printBtn").disabled = false;
            document.getElementById("amountInput").value = "";
            renderCustomerList();
            viewDetail(selectedCustomer.id);
        };

        window.printReceipt = function() {
            if (!currentReceiptData) return;
            const area = document.getElementById("printArea");
            area.innerHTML = `
                <div style="font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; border: 1px solid #000;">
                    <div style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px;">
                        <h1 style="margin: 0; font-size: 24px;">PHIẾU THU TIỀN</h1>
                        <p>Hệ thống SmartFit - Ngày: ${currentReceiptData.date}</p>
                    </div>
                    <p><strong>Khách hàng:</strong> ${currentReceiptData.name}</p>
                    <p><strong>Số tiền:</strong> ${formatMoney(currentReceiptData.amount)}</p>
                    <p><strong>Hình thức:</strong> ${currentReceiptData.method}</p>
                    <div style="margin-top: 40px; display: flex; justify-content: space-between;">
                        <div style="text-align: center; width: 45%;">Người nộp</div>
                        <div style="text-align: center; width: 45%;">Người thu</div>
                    </div>
                </div>`;
            window.print();
        };

        renderCustomerList();
        document.getElementById("searchInput").oninput = renderCustomerList;
    </script>
</body>
</html>
